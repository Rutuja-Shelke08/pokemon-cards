<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>profile Card</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <img src="image.jpeg" alt="profile photo" class="profile-img">
                </div>
                <div class="card-body">
                    <h2>Rutuja Shelke</h2>
                    <p class="title">Frontend Developer</p>
                    <p class="description">
                        Passionate about creating beatiful and responsive web experiences.
                    </p>
                    <div class="stats">
                        <div class="stat">
                            <span class="number">1.2k</span>
                            <span class="label">Projects</span>
                        </div>
                        <div class="stat">
                            <span class="number">89</span>
                            <span class="label">Stars</span>
                        </div>
                    </div>
                    <button class="follow-btn">Follow</button>
                </div>
            </div>
        </div>
        
    </body>
</html>
